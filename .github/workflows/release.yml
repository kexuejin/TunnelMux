name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Expected project version to rehearse, e.g. 0.1.3"
        required: true
        type: string
      macos_signing_required:
        description: "Override macOS signing mode for this rehearsal run"
        required: true
        default: inherit
        type: choice
        options:
          - inherit
          - "true"
          - "false"
      windows_signing_required:
        description: "Override Windows signing mode for this rehearsal run"
        required: true
        default: inherit
        type: choice
        options:
          - inherit
          - "true"
          - "false"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
          - os: macos-15-intel
            target: x86_64-apple-darwin
            archive_ext: tar.gz
          - os: macos-14
            target: aarch64-apple-darwin
            archive_ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release version
        shell: bash
        run: |
          set -euo pipefail
          ACTUAL_VERSION="$(python -c "import tomllib, pathlib; data = tomllib.loads(pathlib.Path('Cargo.toml').read_text()); print(data['workspace']['package']['version'])")"
          INPUT_VERSION="$(python -c "import json, os, pathlib; payload = json.loads(pathlib.Path(os.environ['GITHUB_EVENT_PATH']).read_text()); print((payload.get('inputs') or {}).get('version', ''))")"

          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            if [[ -z "$INPUT_VERSION" ]]; then
              echo "workflow_dispatch requires a version input" >&2
              exit 1
            fi
            if [[ "$INPUT_VERSION" != "$ACTUAL_VERSION" ]]; then
              printf 'workflow_dispatch version %s does not match checked-out project version %s\n' "$INPUT_VERSION" "$ACTUAL_VERSION" >&2
              exit 1
            fi
          else
            TAG_VERSION="${GITHUB_REF_NAME#v}"
            if [[ "$TAG_VERSION" != "$ACTUAL_VERSION" ]]; then
              printf 'tag version %s does not match checked-out project version %s\n' "$TAG_VERSION" "$ACTUAL_VERSION" >&2
              exit 1
            fi
          fi

          echo "RELEASE_VERSION=$ACTUAL_VERSION" >> "$GITHUB_ENV"

      - name: Install Linux GUI dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Build binaries
        run: cargo build --release --locked --target ${{ matrix.target }} -p tunnelmuxd -p tunnelmux-cli -p tunnelmux-gui

      - name: Package binaries
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${RELEASE_VERSION}"
          TARGET="${{ matrix.target }}"
          DIST_DIR="dist"
          PKG_DIR="${DIST_DIR}/tunnelmux-${VERSION}-${TARGET}"
          mkdir -p "${PKG_DIR}"

          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp "target/${TARGET}/release/tunnelmuxd.exe" "${PKG_DIR}/"
            cp "target/${TARGET}/release/tunnelmux-cli.exe" "${PKG_DIR}/"
            cp "target/${TARGET}/release/tunnelmux-gui.exe" "${PKG_DIR}/"
          else
            cp "target/${TARGET}/release/tunnelmuxd" "${PKG_DIR}/"
            cp "target/${TARGET}/release/tunnelmux-cli" "${PKG_DIR}/"
            cp "target/${TARGET}/release/tunnelmux-gui" "${PKG_DIR}/"
          fi

          cp README.md LICENSE CHANGELOG.md "${PKG_DIR}/"

          if [[ "${{ matrix.archive_ext }}" == "zip" ]]; then
            python -c "import pathlib,zipfile; d=pathlib.Path('dist'); ps=[p for p in d.iterdir() if p.is_dir() and p.name.startswith('tunnelmux-')]; assert len(ps)==1, f'expected one package dir, got {len(ps)}'; p=ps[0]; z=zipfile.ZipFile(d / f'{p.name}.zip','w',compression=zipfile.ZIP_DEFLATED); [z.write(f,f.relative_to(d)) for f in p.rglob('*') if f.is_file()]; z.close()"
            echo "ASSET_PATH=${DIST_DIR}/tunnelmux-${VERSION}-${TARGET}.zip" >> "$GITHUB_ENV"
          else
            tar -C "${DIST_DIR}" -czf "${DIST_DIR}/tunnelmux-${VERSION}-${TARGET}.tar.gz" "tunnelmux-${VERSION}-${TARGET}"
            echo "ASSET_PATH=${DIST_DIR}/tunnelmux-${VERSION}-${TARGET}.tar.gz" >> "$GITHUB_ENV"
          fi

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: ${{ env.ASSET_PATH }}

  gui_bundle:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bundle: deb
          - os: macos-15-intel
            target: x86_64-apple-darwin
            bundle: dmg
          - os: macos-14
            target: aarch64-apple-darwin
            bundle: dmg
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundle: msi

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve rehearsal signing overrides
        id: signing_overrides
        shell: bash
        env:
          REPO_GUI_MACOS_SIGNING_REQUIRED: ${{ vars.GUI_MACOS_SIGNING_REQUIRED }}
          REPO_GUI_WINDOWS_SIGNING_REQUIRED: ${{ vars.GUI_WINDOWS_SIGNING_REQUIRED }}
        run: |
          set -euo pipefail
          python -c "import json, os, pathlib; payload = json.loads(pathlib.Path(os.environ['GITHUB_EVENT_PATH']).read_text()); inputs = payload.get('inputs') or {}; repo_macos = os.environ.get('REPO_GUI_MACOS_SIGNING_REQUIRED', ''); repo_windows = os.environ.get('REPO_GUI_WINDOWS_SIGNING_REQUIRED', ''); input_macos = inputs.get('macos_signing_required', ''); input_windows = inputs.get('windows_signing_required', ''); macos = repo_macos if input_macos in ('', 'inherit') else input_macos; windows = repo_windows if input_windows in ('', 'inherit') else input_windows; open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8').write(f'macos_signing_required={macos}\nwindows_signing_required={windows}\n'); open(os.environ['GITHUB_ENV'], 'a', encoding='utf-8').write(f'EFFECTIVE_MACOS_SIGNING_REQUIRED={macos}\nEFFECTIVE_WINDOWS_SIGNING_REQUIRED={windows}\n')"

      - name: Install Linux bundle dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            fakeroot

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Install Windows signing CLI
        if: runner.os == 'Windows' && steps.signing_overrides.outputs.windows_signing_required == 'true'
        shell: bash
        run: cargo install trusted-signing-cli --locked

      - name: Prepare GUI signing
        shell: bash
        env:
          WINDOWS_TRUSTED_SIGNING_ENDPOINT: ${{ vars.WINDOWS_TRUSTED_SIGNING_ENDPOINT }}
          WINDOWS_TRUSTED_SIGNING_ACCOUNT: ${{ vars.WINDOWS_TRUSTED_SIGNING_ACCOUNT }}
          WINDOWS_TRUSTED_SIGNING_PROFILE: ${{ vars.WINDOWS_TRUSTED_SIGNING_PROFILE }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        run: |
          set -euo pipefail
          BUILD_ARGS="--bundles ${{ matrix.bundle }} --target ${{ matrix.target }}"

          macos_required="${EFFECTIVE_MACOS_SIGNING_REQUIRED:-}"
          windows_required="${EFFECTIVE_WINDOWS_SIGNING_REQUIRED:-}"

          case "${{ runner.os }}" in
            macOS)
              if [[ "$macos_required" == "true" ]]; then
                required=(
                  APPLE_CERTIFICATE
                  APPLE_CERTIFICATE_PASSWORD
                  APPLE_SIGNING_IDENTITY
                  APPLE_API_ISSUER
                  APPLE_API_KEY
                  APPLE_API_PRIVATE_KEY
                )
                missing=()
                for var_name in "${required[@]}"; do
                  if [[ -z "${!var_name:-}" ]]; then
                    missing+=("$var_name")
                  fi
                done
                if [[ ${#missing[@]} -gt 0 ]]; then
                  printf 'macOS signing required but missing: %s\n' "${missing[*]}" >&2
                  exit 1
                fi

                key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY}.p8"
                printf '%s' "$APPLE_API_PRIVATE_KEY" > "$key_path"
                chmod 600 "$key_path"
                echo "APPLE_API_KEY_PATH=$key_path" >> "$GITHUB_ENV"
                echo "GUI_SIGNING_MODE=macos-signed" >> "$GITHUB_ENV"
                echo "macOS GUI signing enabled"
              else
                echo "GUI_SIGNING_MODE=unsigned" >> "$GITHUB_ENV"
                echo "macOS GUI signing disabled; building unsigned installer"
              fi
              ;;
            Windows)
              if [[ "$windows_required" == "true" ]]; then
                required=(
                  AZURE_CLIENT_ID
                  AZURE_CLIENT_SECRET
                  AZURE_TENANT_ID
                  WINDOWS_TRUSTED_SIGNING_ENDPOINT
                  WINDOWS_TRUSTED_SIGNING_ACCOUNT
                  WINDOWS_TRUSTED_SIGNING_PROFILE
                )
                missing=()
                for var_name in "${required[@]}"; do
                  if [[ -z "${!var_name:-}" ]]; then
                    missing+=("$var_name")
                  fi
                done
                if [[ ${#missing[@]} -gt 0 ]]; then
                  printf 'Windows signing required but missing: %s\n' "${missing[*]}" >&2
                  exit 1
                fi

                signing_config="$RUNNER_TEMP/tauri.windows.signing.conf.json"
                bash scripts/write-gui-windows-signing-config.sh "$signing_config"
                BUILD_ARGS="$BUILD_ARGS -c $signing_config"
                echo "TAURI_WINDOWS_SIGNING_CONFIG=$signing_config" >> "$GITHUB_ENV"
                echo "GUI_SIGNING_MODE=windows-signed" >> "$GITHUB_ENV"
                echo "Windows GUI signing enabled"
              else
                echo "GUI_SIGNING_MODE=unsigned" >> "$GITHUB_ENV"
                echo "Windows GUI signing disabled; building unsigned installer"
              fi
              ;;
            *)
              echo "GUI_SIGNING_MODE=unsigned" >> "$GITHUB_ENV"
              echo "Linux GUI bundles remain unsigned in this workflow"
              ;;
          esac

          echo "TAURI_BUILD_ARGS=$BUILD_ARGS" >> "$GITHUB_ENV"

      - name: Build GUI bundle
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ env.APPLE_API_KEY_PATH }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        with:
          projectPath: crates/tunnelmux-gui
          args: ${{ env.TAURI_BUILD_ARGS }}

      - name: Collect GUI bundle artifacts
        shell: bash
        run: |
          set -euo pipefail
          DIST_DIR="dist"
          mkdir -p "$DIST_DIR"
          CANDIDATES=(
            "target/${{ matrix.target }}/release/bundle"
            "target/release/bundle"
          )
          BUNDLE_DIR=""
          for candidate in "${CANDIDATES[@]}"; do
            if [[ -d "$candidate" ]] && find "$candidate" -type f -name "*.${{ matrix.bundle }}" -print -quit | grep -q .; then
              BUNDLE_DIR="$candidate"
              break
            fi
          done
          if [[ -z "$BUNDLE_DIR" ]]; then
            echo "no GUI bundle directory contained .${{ matrix.bundle }} assets" >&2
            printf 'checked candidates:\n%s\n' "${CANDIDATES[@]}" >&2
            exit 1
          fi
          printf 'collecting GUI bundles from %s\n' "$BUNDLE_DIR"
          bash scripts/collect-gui-bundles.sh "$BUNDLE_DIR" "$DIST_DIR" "${{ matrix.bundle }}"

      - name: Upload GUI bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gui-bundle-${{ matrix.target }}
          path: dist/*

  publish:
    runs-on: ubuntu-latest
    needs:
      - build
      - gui_bundle
    steps:
      - name: Download raw archive artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: Download GUI bundle artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: gui-bundle-*
          merge-multiple: true

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd dist
          sha256sum * > SHA256SUMS

      - name: Upload rehearsal artifacts
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: rehearsal-dist
          path: dist/*

      - name: Publish GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*
