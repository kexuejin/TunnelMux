name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
          - os: macos-15-intel
            target: x86_64-apple-darwin
            archive_ext: tar.gz
          - os: macos-14
            target: aarch64-apple-darwin
            archive_ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux GUI dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Build binaries
        run: cargo build --release --locked --target ${{ matrix.target }} -p tunnelmuxd -p tunnelmux-cli -p tunnelmux-gui

      - name: Package binaries
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          TARGET="${{ matrix.target }}"
          DIST_DIR="dist"
          PKG_DIR="${DIST_DIR}/tunnelmux-${VERSION}-${TARGET}"
          mkdir -p "${PKG_DIR}"

          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp "target/${TARGET}/release/tunnelmuxd.exe" "${PKG_DIR}/"
            cp "target/${TARGET}/release/tunnelmux-cli.exe" "${PKG_DIR}/"
            cp "target/${TARGET}/release/tunnelmux-gui.exe" "${PKG_DIR}/"
          else
            cp "target/${TARGET}/release/tunnelmuxd" "${PKG_DIR}/"
            cp "target/${TARGET}/release/tunnelmux-cli" "${PKG_DIR}/"
            cp "target/${TARGET}/release/tunnelmux-gui" "${PKG_DIR}/"
          fi

          cp README.md LICENSE CHANGELOG.md "${PKG_DIR}/"

          if [[ "${{ matrix.archive_ext }}" == "zip" ]]; then
            python -c "import pathlib,zipfile; d=pathlib.Path('dist'); ps=[p for p in d.iterdir() if p.is_dir() and p.name.startswith('tunnelmux-')]; assert len(ps)==1, f'expected one package dir, got {len(ps)}'; p=ps[0]; z=zipfile.ZipFile(d / f'{p.name}.zip','w',compression=zipfile.ZIP_DEFLATED); [z.write(f,f.relative_to(d)) for f in p.rglob('*') if f.is_file()]; z.close()"
            echo "ASSET_PATH=${DIST_DIR}/tunnelmux-${VERSION}-${TARGET}.zip" >> "$GITHUB_ENV"
          else
            tar -C "${DIST_DIR}" -czf "${DIST_DIR}/tunnelmux-${VERSION}-${TARGET}.tar.gz" "tunnelmux-${VERSION}-${TARGET}"
            echo "ASSET_PATH=${DIST_DIR}/tunnelmux-${VERSION}-${TARGET}.tar.gz" >> "$GITHUB_ENV"
          fi

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: ${{ env.ASSET_PATH }}

  gui_bundle:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bundle: deb
          - os: macos-15-intel
            target: x86_64-apple-darwin
            bundle: dmg
          - os: macos-14
            target: aarch64-apple-darwin
            bundle: dmg
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundle: msi

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux bundle dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            fakeroot

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Build GUI bundle
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: crates/tunnelmux-gui
          args: --bundles ${{ matrix.bundle }} --target ${{ matrix.target }}

      - name: Collect GUI bundle artifacts
        shell: bash
        run: |
          set -euo pipefail
          BUNDLE_DIR="target/${{ matrix.target }}/release/bundle"
          DIST_DIR="dist"
          bash scripts/collect-gui-bundles.sh "$BUNDLE_DIR" "$DIST_DIR" "${{ matrix.bundle }}"

      - name: Upload GUI bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gui-bundle-${{ matrix.target }}
          path: dist/*

  publish:
    runs-on: ubuntu-latest
    needs:
      - build
      - gui_bundle
    steps:
      - name: Download raw archive artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: Download GUI bundle artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: gui-bundle-*
          merge-multiple: true

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd dist
          sha256sum * > SHA256SUMS

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*
